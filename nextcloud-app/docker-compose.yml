# FilantropiaSolar Development Environment
#
# Docker Compose configuration for running Nextcloud with the ML microservice.
# Use: docker compose up -d
#
# Access:
# - Nextcloud: http://localhost:8080
# - ML Service: http://localhost:8501
# - Adminer (DB): http://localhost:8081

services:
  # Nextcloud server
  nextcloud:
    image: nextcloud:28-apache
    container_name: filantropia-nextcloud
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_dev_password
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost
    volumes:
      - nextcloud_data:/var/www/html
      - ./:/var/www/html/custom_apps/filantropia_solar:ro
    depends_on:
      - db
      - redis
    networks:
      - filantropia-net
    restart: unless-stopped

  # MariaDB database
  db:
    image: mariadb:10.11
    container_name: filantropia-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_dev_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_dev_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - filantropia-net
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: filantropia-redis
    networks:
      - filantropia-net
    restart: unless-stopped

  # ML Microservice
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: filantropia-ml
    ports:
      - "8501:8501"
    environment:
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/data
      - WEATHER_PATH=/app/weather_files
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
      - ../Data:/app/data:ro
      - ../weather_files:/app/weather_files:ro
    networks:
      - filantropia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Adminer for database management (optional, development only)
  adminer:
    image: adminer:latest
    container_name: filantropia-adminer
    ports:
      - "8081:8080"
    networks:
      - filantropia-net
    profiles:
      - debug
    restart: unless-stopped

networks:
  filantropia-net:
    driver: bridge

volumes:
  nextcloud_data:
  db_data:
  ml_models:
