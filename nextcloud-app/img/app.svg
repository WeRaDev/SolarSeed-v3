<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Solar panel base -->
  <rect x="4" y="8" width="24" height="16" rx="2" fill="#C4B552"/>
  
  <!-- Panel cells - 3x2 grid -->
  <rect x="5" y="9" width="7" height="6.5" fill="#A89D3F" stroke="#FDFBF5" stroke-width="0.5"/>
  <rect x="12.5" y="9" width="7" height="6.5" fill="#A89D3F" stroke="#FDFBF5" stroke-width="0.5"/>
  <rect x="20" y="9" width="7" height="6.5" fill="#A89D3F" stroke="#FDFBF5" stroke-width="0.5"/>
  <rect x="5" y="16" width="7" height="6.5" fill="#A89D3F" stroke="#FDFBF5" stroke-width="0.5"/>
  <rect x="12.5" y="16" width="7" height="6.5" fill="#A89D3F" stroke="#FDFBF5" stroke-width="0.5"/>
  <rect x="20" y="16" width="7" height="6.5" fill="#A89D3F" stroke="#FDFBF5" stroke-width="0.5"/>
  
  <!-- Sun rays -->
  <circle cx="26" cy="6" r="3" fill="#D4C563"/>
  <line x1="26" y1="1" x2="26" y2="3" stroke="#D4C563" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="6" x2="28" y2="6" stroke="#D4C563" stroke-width="1" stroke-linecap="round"/>
  <line x1="29" y1="3" x2="27.5" y2="4.5" stroke="#D4C563" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Stand -->
  <rect x="14" y="24" width="4" height="4" fill="#A89D3F"/>
  <rect x="10" y="28" width="12" height="2" rx="1" fill="#A89D3F"/>
</svg>
