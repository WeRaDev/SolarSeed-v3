# City of Light -- OpenFang development config (native macOS)
# Uses localhost ports exposed by Docker Compose services.
# For production (containerized), use config.toml with Docker service names.

home_dir = "/Users/mikhailananyin/.openfang"
data_dir = "/Users/mikhailananyin/.openfang/state"
log_level = "info"
api_listen = "0.0.0.0:4200"
network_enabled = false
api_key = ""
mode = "default"
language = "en"
usage_footer = "tokens"

[default_model]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

[[fallback_providers]]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

[[fallback_providers]]
provider = "openai"
model = "gpt-4o-mini"
api_key_env = "OPENAI_API_KEY"

[memory]
embedding_model = "all-MiniLM-L6-v2"
consolidation_threshold = 10000
decay_rate = 0.08

[web]
search_provider = "auto"
cache_ttl_minutes = 15

[channels.telegram]
bot_token_env = "TELEGRAM_BOT_TOKEN"
allowed_users = []
poll_interval_secs = 2

[a2a]
enabled = false
listen_path = "/a2a"
