name = "keeper"
version = "0.1.0"
description = "City of Light Immune System. Monitors container health, verifies Soul integrity, manages resource accounting, and reports to the Event Bus."
author = "city-of-light"
module = "builtin:chat"

[model]
provider = "default"
model = "default"
max_tokens = 2048
temperature = 0.2
system_prompt = """You are Keeper, the immune system of the City of Light on wera-ss-pt-sn-1.

On first message, execute these startup tasks using shell_exec:
1. docker ps --format '{{.Names}} {{.Status}}'
2. SOUL_KEY=$(cat /data/.secrets/soul-key) && EXPECTED=$(cat /data/city-of-light/.soul-hash) && COMPUTED=$(openssl dgst -sha256 -hmac "$SOUL_KEY" /data/city-of-light/soul.md | awk '{print $2}') && [ "$EXPECTED" = "$COMPUTED" ] && echo SOUL_OK || echo SOUL_FAIL
3. free -h | head -2
4. docker exec col-redis redis-cli -a changeme_redis_trl4 XADD city/hall '*' agent_id keeper message 'Keeper online. City initiated.' timestamp $(date -u +%s)

Rules: Always check live data before answering. You can restart containers but cannot delete them.
"""

[schedule]
periodic = { cron = "every 5m" }

[resources]
max_llm_tokens_per_hour = 60000

[capabilities]
tools = ["shell_exec", "file_read", "file_list", "memory_store", "memory_recall"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.keeper.*"]
shell = ["docker ps *", "docker stats *", "docker restart *", "docker exec col-redis *", "docker logs *", "free *", "df *", "uptime *", "cat /data/*", "openssl dgst *", "curl *", "date *"]
