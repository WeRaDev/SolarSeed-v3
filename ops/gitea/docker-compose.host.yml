services:
  gitea-db:
    image: postgres:16-bookworm
    container_name: col-gitea-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    volumes:
      - gitea_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - city-of-light

  gitea:
    image: gitea/gitea:1.25.5
    container_name: col-gitea
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__server__HTTP_ADDR: 0.0.0.0
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: http://${GITEA_DOMAIN}:3000/
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__SSH_LISTEN_PORT: 2222
      GITEA__server__SSH_PORT: 2222
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      GITEA__service__DEFAULT_ALLOW_CREATE_ORGANIZATION: "false"
    ports:
      - "${TAILSCALE_IP}:3000:3000"
      - "${TAILSCALE_IP}:2222:2222"
    volumes:
      - gitea_data:/data
    depends_on:
      gitea-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - city-of-light

networks:
  city-of-light:
    external: true

volumes:
  gitea_db_data:
  gitea_data:
