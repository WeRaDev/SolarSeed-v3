services:
  odoo-db:
    image: ${ODOO_DB_IMAGE:-pgvector/pgvector:pg16}
    container_name: solarseed-odoo-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${ODOO_DB_NAME:-wera}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo_db_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo} -d ${ODOO_DB_NAME:-wera}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odoo_net

  odoo:
    image: odoo:${ODOO_VERSION:-19.0}
    container_name: solarseed-odoo
    restart: unless-stopped
    depends_on:
      odoo-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HOST: odoo-db
      PORT: 5432
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD}
    command:
      - "--db-filter=${ODOO_DB_FILTER:-^wera$}"
      - "--without-demo=${ODOO_WITHOUT_DEMO:-False}"
    ports:
      - "${ODOO_BIND_HOST:-127.0.0.1}:${ODOO_HTTP_PORT:-8069}:8069"
      - "${ODOO_BIND_HOST:-127.0.0.1}:${ODOO_LONGPOLL_PORT:-8072}:8072"
    volumes:
      - odoo_web_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
    networks:
      - odoo_net

networks:
  odoo_net:
    driver: bridge

volumes:
  odoo_db_data:
  odoo_web_data:
