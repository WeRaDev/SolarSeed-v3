version: "1.0"
scope: "project"
repository: "SolarSeed-v3"
description: "Project-level skill registry for TRL machine operations with umbrella inheritance."
inherits:
  umbrella_registry: "../../skills/registry.yaml"
inheritance_policy: "Use local profiles first, then umbrella defaults; local definitions must preserve umbrella safety and quality constraints."
execution_profiles:
  default_development_flow:
    - "repo-orientation"
    - "task-intake"
    - "implementation-plan"
    - "quality-gate"
    - "release-readiness"
    - "retro-capture"
  trl_machine_change_flow:
    - "repo-orientation"
    - "task-intake"
    - "trl-machine-change"
    - "quality-gate"
    - "release-readiness"
skills:
  - id: "repo-orientation"
    source: "umbrella"
    path: "../../skills/repo-orientation.md"
  - id: "task-intake"
    source: "umbrella"
    path: "../../skills/task-intake.md"
  - id: "implementation-plan"
    source: "umbrella"
    path: "../../skills/implementation-plan.md"
  - id: "quality-gate"
    source: "umbrella"
    path: "../../skills/quality-gate.md"
  - id: "release-readiness"
    source: "umbrella"
    path: "../../skills/release-readiness.md"
  - id: "retro-capture"
    source: "umbrella"
    path: "../../skills/retro-capture.md"
  - id: "revisor-pr-audit"
    source: "umbrella"
    path: "../../skills/revisor-pr-audit.md"
  - id: "trl-machine-change"
    source: "project"
    path: "skills/trl-machine-change.md"
